<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Mapa Inteligente - Lotes BA</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>

<style>
body{margin:0;font-family:Arial;background:#f4f6fb}
#app{display:flex;height:100vh}

/* OVERLAY */
#overlay{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.4);
  z-index:998;
  opacity:0;
  pointer-events:none;
  transition:.3s;
}
#overlay.ativo{
  opacity:1;
  pointer-events:auto;
}

/* PAINEL */
#painel{
  width:320px;
  background: linear-gradient(180deg,#1F3864,#2c528c);
  color:#fff;
  padding:15px;
  overflow:auto;
  transition:.3s;
}

.titulo{margin:0 0 15px 0;font-size:20px;font-weight:bold;}

.card{
  background:rgba(255,255,255,0.08);
  padding:12px;
  border-radius:10px;
  margin-bottom:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

select,button{
  width:100%;
  padding:8px;
  margin-bottom:6px;
  border-radius:6px;
  border:none;
}

select{background:#fff;color:#333;}

.btn{background:#4da3ff;color:#fff;font-weight:bold;cursor:pointer;}
.btn:hover{background:#6cb5ff;}

.lote{
  padding:8px;margin-bottom:6px;border-radius:6px;
  display:flex;justify-content:space-between;
  background:rgba(255,255,255,0.1);
  color:#fff;
}

.lote.ativo{font-weight:bold}

#map{flex:1}

/* BOTÃO */
#btnMenu{
  display:none;
  position:absolute;
  top:10px;left:10px;
  z-index:999;
  background:#1F3864;
  color:#fff;
  border:none;
  padding:10px;
  border-radius:8px;
}

/* MARCADOR */
.marker{
  width:16px;
  height:16px;
  border-radius:50%;
  border:2px solid #fff;
}

/* TOOLTIP (INALTERADO) */
.leaflet-tooltip.label-fixa{
  background: rgba(31,56,100,0.92) !important;
  color:#fff;
  border:none !important;
  border-radius:6px;
  padding:4px 8px;
  font-size:10px;
  font-weight:600;
}

/* MOBILE */
@media (max-width:768px){
  #app{flex-direction:column;}

  #painel{
    position:absolute;
    left:-100%;
    top:0;
    height:100%;
    width:85%;
    z-index:1000;
  }

  #painel.aberto{left:0;}
  #btnMenu{display:block;}
}
</style>
</head>

<body>

<div id="overlay" onclick="fecharPainel()"></div>
<button id="btnMenu" onclick="abrirPainel()">☰</button>

<div id="app">

<div id="painel">

<h2 class="titulo">Mapa Inteligente</h2>

<div class="card">
  <h3>🔎 Filtros</h3>

  <select id="f-evento"><option value="">Evento</option></select>
  <select id="f-dem"><option value="">Órgão</option></select>
  <select id="f-tipo"><option value="">Tipo</option></select>

  <button class="btn" onclick="resetFiltros()">Limpar Filtros</button>
  <button class="btn" onclick="alternarVisual()" id="btnVisual">Visual: Lote</button>
</div>

<div class="card">
  <h3>🗂️ Lotes</h3>
  <div id="lotes"></div>
</div>

</div>

<div id="map"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<script>

var POSTOS=[], LOTES=[], markers=[], poligonos=[];
var loteAtivo=null;
var coresLotes={}, coresDem={};
var modoVisual="lote";

var map=L.map('map').setView([-12.97,-38.51],12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// ===== PAINEL =====
function abrirPainel(){
  document.getElementById("painel").classList.add("aberto");
  document.getElementById("overlay").classList.add("ativo");
}

function fecharPainel(){
  document.getElementById("painel").classList.remove("aberto");
  document.getElementById("overlay").classList.remove("ativo");
}

function fecharMenuMobile(){
  if(window.innerWidth <= 768){
    setTimeout(fecharPainel,200);
  }
}

// FECHAR AO CLICAR NO MAPA
map.on("click",()=>fecharMenuMobile());

// SWIPE
let startX=null;
document.addEventListener("touchstart",e=>{startX=e.touches[0].clientX;});
document.addEventListener("touchend",e=>{
  if(startX===null) return;
  let diff=e.changedTouches[0].clientX-startX;
  if(diff>80) abrirPainel();
  if(diff<-80) fecharPainel();
  startX=null;
});

// ===== RESTANTE (INALTERADO) =====
function normalizar(v){
  return (v||"").toString().normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase();
}

function corLote(i,total){
  return `hsl(${(i*360/total)},70%,50%)`;
}

function gerarCoresDem(){
  let nomes=[...new Set(POSTOS.map(p=>p.dem))];
  nomes.forEach((d,i)=>coresDem[d]=corLote(i,nomes.length));
}

async function carregarDados(){
  const res=await fetch("https://script.google.com/macros/s/AKfycbzO3CxkaujHwu7Zx7KLqAzjfpUurxY_5IyR6FhqeJRaudKxwjOm9QAFSjEXh1g1H0qvtA/exec");
  const data=await res.json();

  POSTOS=data.map(p=>({
    nome:p["NOMENCLATURA"],
    evento:p.EVENTO,
    dem:p.DEMANDA || p.DEMANDANTE,
    tipo:p["TIPO DE ESTRUTURA"],
    tipo:p["TIPO ESTRUTURA"],
    lat:parseFloat(String(p.LATITUDE).replace(",", ".")),
    lng:parseFloat(String(p.LONGITUDE).replace(",", ".")),
    lote:p["LOTE PROPOSTO"] || "Sem lote"
  }));

  gerarLotes();
  gerarCoresDem();
  preencherFiltros();
  render();
}

function gerarLotes(){
  let nomes=[...new Set(POSTOS.map(p=>p.lote))];
  LOTES=nomes.map((l,i)=>({id:l,nome:l,cor:corLote(i,nomes.length)}));
  LOTES.forEach(l=>coresLotes[l.id]=l.cor);
  renderLotes();
}

function renderLotes(){
  var el=document.getElementById("lotes");
  el.innerHTML="";

  LOTES.forEach(l=>{
    var div=document.createElement("div");
    div.className="lote"+(loteAtivo===l.id?" ativo":"");
    div.innerHTML=`<span>${l.nome}</span><span style="background:${l.cor};width:12px;height:12px;border-radius:50%"></span>`;

    div.onclick=()=>{
      loteAtivo = loteAtivo===l.id ? null : l.id;
      render();
      renderLotes();
      fecharMenuMobile();
    };

    el.appendChild(div);
  });
}

function preencherFiltros(){
  pop("f-evento",[...new Set(POSTOS.map(p=>p.evento))]);
  pop("f-dem",[...new Set(POSTOS.map(p=>p.dem))]);
  pop("f-tipo",[...new Set(POSTOS.map(p=>p.tipo))]);
}

function pop(id,arr){
  var s=document.getElementById(id);
  arr.forEach(v=>{
    var o=document.createElement("option");
    o.value=v;o.textContent=v;
    s.appendChild(o);
  });
}

function getFiltros(){
  return{
    evento:document.getElementById("f-evento").value,
    dem:document.getElementById("f-dem").value,
    tipo:document.getElementById("f-tipo").value
  };
}

function resetFiltros(){
  document.getElementById("f-evento").value="";
  document.getElementById("f-dem").value="";
  document.getElementById("f-tipo").value="";
  loteAtivo=null;
  render();
  renderLotes();
  fecharMenuMobile();
}

function alternarVisual(){
  modoVisual = modoVisual==="lote"?"dem":"lote";
  document.getElementById("btnVisual").innerText="Visual: "+(modoVisual==="lote"?"Lote":"Órgão");
  render();
  fecharMenuMobile();
}

function render(){

  markers.forEach(m=>map.removeLayer(m));
  poligonos.forEach(p=>map.removeLayer(p));

  markers=[]; poligonos=[];

  var f=getFiltros();

  var vis=POSTOS.filter(p=>{
    if(f.evento && normalizar(p.evento)!==normalizar(f.evento)) return false;
    if(f.dem && normalizar(p.dem)!==normalizar(f.dem)) return false;
    if(f.tipo && normalizar(p.tipo)!==normalizar(f.tipo)) return false;
    if(loteAtivo && p.lote!==loteAtivo) return false;
    return true;
  });

  vis.forEach(p=>{
    if(!p.lat || !p.lng) return;

    var cor = modoVisual==="lote"
      ? (coresLotes[p.lote]||"#999")
      : (coresDem[p.dem]||"#999");

    var icon=L.divIcon({
      html:`<div class="marker" style="background:${cor}"></div>`
    });

    var marker=L.marker([p.lat,p.lng],{icon})
      .bindTooltip(`<b>${p.nome}</b><br>${p.evento}`,{permanent:true,offset:[0,-12],className:"label-fixa"})
      .addTo(map);

    markers.push(marker);
  });

  let grupos={};

  vis.forEach(p=>{
    let chave = modoVisual==="lote"?p.lote:p.dem;
    if(!grupos[chave]) grupos[chave]=[];
    grupos[chave].push([p.lat,p.lng]);
  });

  Object.keys(grupos).forEach(k=>{
    let pts=grupos[k];
    if(pts.length<3) return;

    let cor = modoVisual==="lote"
      ? (coresLotes[k]||"#999")
      : (coresDem[k]||"#999");

    let poly=L.polygon(pts,{color:cor,weight:2,fillOpacity:0.08}).addTo(map);
    poligonos.push(poly);
  });

  if(vis.length){
    map.fitBounds(vis.map(p=>[p.lat,p.lng]));
  }
}

["f-evento","f-dem","f-tipo"].forEach(id=>{
  document.getElementById(id).addEventListener("change",()=>{
    render();
    fecharMenuMobile();
  });
});

carregarDados();

</script>

</body>
</html>
